name: Publish documentation
run-name: Build

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Build javadoc and copy files to gh-pages
        run: |
          mvn clean package -DskipTests
          project_version=$(ls -d target/reports/*/ | head -n 1 | xargs basename)
          if [ -z "$project_version" ]; then
            echo "Error: \$project_version is not defined. Check build process and project version." >&2
            exit 1
          fi
          rm -rf gh-pages/docs/javadoc/"$project_version" 2>/dev/null
          rm -rf gh-pages/docs/javadoc/latest 2>/dev/null
          cp -r target/reports/"$project_version"/apidocs gh-pages/docs/javadoc/"$project_version"
          cp -r target/reports/"$project_version"/apidocs gh-pages/docs/javadoc/latest
          echo ":root { --navbar-background-color: #4A314D; }" >> gh-pages/docs/javadoc/latest/resource-files/stylesheet.css

      - name: Build vocabulary docs in gh-pages
        run: |
          cp -r hefquin-vocabs/ gh-pages/vocabs
          cd gh-pages
          pip install -r ./docs-scripts/requirements.txt
          python ./docs-scripts/build.py

      - name: Commit gh-pages files
        working-directory: gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f docs/
          git commit -m "update docs" -a  || echo "No changes to commit"

      - name: Push changes to gh-pages
        working-directory: gh-pages
        run: |
          git push origin HEAD:gh-pages
